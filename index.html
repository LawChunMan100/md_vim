<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Renderer</title>
    <!-- MathJax for LaTeX support -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: { fontCache: 'global' }
      };
    </script>
    <!--<script src="https://cdn.jsdelivr.net/npm/mathjax@4.1.1/tex-svg.js"></script>-->
    <script src="./lib/tex/tex-svg.js"></script>
    <!--<script src="https://cdn.jsdelivr.net/npm/marked@17.0.4/lib/marked.umd.js"></script>-->
    <script src="./lib/marked.umd.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="preview"></div>
    <script src="script.js"></script>
  </body>
</html>
